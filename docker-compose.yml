services:
  postgres:
    image: postgres:16-alpine
    container_name: homeimprovepk-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: homeimprovepk
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: homeimprovepk-redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: .
    container_name: homeimprovepk-backend
    env_file: .env
    environment:
      # Internal container addresses override the localhost values in .env
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/homeimprovepk
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    ports:
      - '3001:3001'
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "npx prisma generate &&
             npx prisma db push --accept-data-loss &&
             npx prisma db seed &&
             npm run start:dev"

volumes:
  postgres-data:
  redis-data:
